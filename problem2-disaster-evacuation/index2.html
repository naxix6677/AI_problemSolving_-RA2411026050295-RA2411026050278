<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Disaster Evacuation Planner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
    }
    .container {
      display: flex;
      justify-content: space-around;
      margin-top: 50px;
    }
    .side {
      width: 40%;
      padding: 20px;
      border: 2px solid white;
      border-radius: 10px;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    .boat {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>
<body>

<h1>🚨 Disaster Evacuation Planner</h1>
<p>Move everyone safely without responders being outnumbered!</p>

<div class="container">
  <div class="side" id="left">
    <h2>Danger Zone</h2>
    <p>Civilians: <span id="civLeft">3</span></p>
    <p>Responders: <span id="resLeft">3</span></p>
  </div>

  <div class="side" id="right">
    <h2>Safe Zone</h2>
    <p>Civilians: <span id="civRight">0</span></p>
    <p>Responders: <span id="resRight">0</span></p>
  </div>
</div>

<div class="boat">
  <p>🚤 Boat is on: <span id="boatSide">Left</span></p>

  <button onclick="move(1,0)">1 Civilian</button>
  <button onclick="move(2,0)">2 Civilians</button>
  <button onclick="move(0,1)">1 Responder</button>
  <button onclick="move(0,2)">2 Responders</button>
  <button onclick="move(1,1)">1 + 1</button>
</div>

<h2 id="status"></h2>

<script>
let civLeft = 3, resLeft = 3;
let civRight = 0, resRight = 0;
let boat = "left";

function updateUI() {
  document.getElementById("civLeft").innerText = civLeft;
  document.getElementById("resLeft").innerText = resLeft;
  document.getElementById("civRight").innerText = civRight;
  document.getElementById("resRight").innerText = resRight;
  document.getElementById("boatSide").innerText = boat === "left" ? "Left" : "Right";
}

function isValid() {
  if (resLeft > 0 && civLeft > resLeft) return false;
  if (resRight > 0 && civRight > resRight) return false;
  return true;
}

function move(c, r) {
  if (c + r > 2 || c + r === 0) return;

  if (boat === "left") {
    if (civLeft < c || resLeft < r) return;
    civLeft -= c;
    resLeft -= r;
    civRight += c;
    resRight += r;
    boat = "right";
  } else {
    if (civRight < c || resRight < r) return;
    civRight -= c;
    resRight -= r;
    civLeft += c;
    resLeft += r;
    boat = "left";
  }

  if (!isValid()) {
    document.getElementById("status").innerText = "❌ Mission Failed!";
    return;
  }

  if (civRight === 3 && resRight === 3) {
    document.getElementById("status").innerText = "✅ All Evacuated Successfully!";
  }

  updateUI();
}

updateUI();
</script>

</body>
</html>
